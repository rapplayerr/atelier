{% comment %} {% extends 'main/layout.html' %}

{% block title %}Обновление статьи{% endblock %}

{% block content %}
<div class = 'features'>
    <h1>Обновите запись</h1>
    <form method='POST' action = '{% url 'update' article.id %}'>
        {% csrf_token %}
        {{ form.title }}<br>
        {{ form.announce }}<br>
        {{ form.content }}<br>
        {{ form.date }}<br>
        <span>{{error}}</span>
        <button class = 'btn btn-success' type = 'submit'>Добавить статью</button>

    </form>
</div>
{% endblock %} {% endcomment %}
